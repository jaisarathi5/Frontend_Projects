<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Task Planner</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <header>
    <h1>Smart Task Planner</h1>
    <p>Organize your tasks efficiently</p>
  </header>

  <section class="task-form">
    <input type="text" id="taskInput" placeholder="Enter task description" maxlength="100">
    <select id="priority">
      <option value="Low">Low Priority</option>
      <option value="Medium" selected>Medium Priority</option>
      <option value="High">High Priority</option>
    </select>
    <input type="text" id="categoryInput" placeholder="Category (optional)" maxlength="30">
    <input type="date" id="dueDateInput" title="Due date (optional)">
    <button onclick="addTask()">Add Task</button>
  </section>

  <section class="search-section">
    <input type="text" id="searchInput" placeholder="Search tasks..." onkeyup="searchTasks()">
    <div class="action-buttons">
      <button onclick="sortTasks('priority')" title="Sort by priority">🔥 Priority</button>
      <button onclick="sortTasks('dueDate')" title="Sort by due date">📅 Due Date</button>
      <button onclick="exportTasks()" title="Export tasks">📤 Export</button>
      <button onclick="importTasks()" title="Import tasks">📥 Import</button>
      <button onclick="toggleTheme()" title="Toggle theme">🌓 Theme</button>
      <button onclick="clearCompleted()" class="clear-btn" title="Clear completed tasks">🗑️ Clear Completed</button>
    </div>
  </section>

  <section class="filters">
    <button onclick="filterTasks('all')" class="active">All Tasks</button>
    <button onclick="filterTasks('pending')">Pending</button>
    <button onclick="filterTasks('completed')">Completed</button>
  </section>

  <section class="task-stats" id="taskStats">
    <!-- Stats will be populated by JavaScript -->
  </section>

  <ul id="taskList"></ul>

  <footer>
    <p>💡 Tip: Use Ctrl+N to add new task, Ctrl+F to search, Esc to blur inputs</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
