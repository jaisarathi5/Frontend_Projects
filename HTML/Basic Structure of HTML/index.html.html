<!DOCTYPE html>
<html>
<style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #2c3e50;
        }
        hr {
            border: 5px;
            border-top: 1px solid navy;
            margin: 20px 0;
        }
        p {
            font-size: 16px;
        }
    </style>
    <head>
        <title>Basic Structure of HTML</title>
    </head>
<body>
    <h1>Amazon Employee Profile</h1>
    <hr>
    <h2>Employee Name: Heli</h2>
    <h3>Employee Role: FrontEnd Developer</h3>
    <h4>Employee id: AD15K2</h4>
    <hr>
    <h2>About this Employee:</h2>
    <h5>Completed 100 plus Projects</h5>
    <p>Senior FrontEnd Developer</p>
    <h4>Next year he will the <strong>Manager</strong> in the <u>California Branch</u></h4>
</body>
</html>
